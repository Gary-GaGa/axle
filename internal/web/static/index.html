<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ AXLE QUEST — RPG Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --panel: #16213e;
  --border: #e94560;
  --text: #eee;
  --gold: #ffd700;
  --green: #00ff41;
  --blue: #4fc3f7;
  --purple: #ba68c8;
  --red: #e94560;
  --mana: #2196f3;
  --xp-bar: #ffd700;
  --xp-bg: #333;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Press Start 2P', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 10px;
  image-rendering: pixelated;
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  background: linear-gradient(180deg, #0f3460, var(--panel));
  border-bottom: 4px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header h1 { font-size: 14px; color: var(--gold); text-shadow: 2px 2px #000; }
.header .status { font-size: 8px; color: var(--green); }
.header .status.offline { color: var(--red); }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: 280px 1fr 300px;
  grid-template-rows: auto 1fr;
  gap: 8px;
  padding: 8px;
  height: calc(100vh - 56px);
}

/* ── Panels ── */
.panel {
  background: var(--panel);
  border: 3px solid #333;
  border-radius: 4px;
  padding: 10px;
  position: relative;
  overflow: hidden;
}
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--border);
}
.panel-title {
  font-size: 9px;
  color: var(--gold);
  margin-bottom: 8px;
  text-transform: uppercase;
}

/* ── Character Panel ── */
.char-panel { grid-row: 1 / 3; }
.char-sprite {
  width: 120px; height: 120px;
  margin: 10px auto;
  position: relative;
}
.pixel-char {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  filter: drop-shadow(0 0 8px rgba(255,215,0,0.3));
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.char-info { text-align: center; margin-top: 8px; }
.char-level { font-size: 14px; color: var(--gold); }
.char-title { font-size: 8px; color: var(--purple); margin-top: 4px; }

/* ── XP Bar ── */
.xp-bar-wrap {
  margin: 12px 0;
  background: var(--xp-bg);
  border: 2px solid #555;
  height: 16px;
  position: relative;
}
.xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff8c00, var(--gold));
  transition: width 0.8s ease;
  position: relative;
}
.xp-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(255,255,255,0.1) 4px, rgba(255,255,255,0.1) 8px);
}
.xp-text { font-size: 7px; text-align: center; margin-top: 4px; color: #aaa; }

/* ── Equipment ── */
.equip-list { list-style: none; font-size: 8px; }
.equip-list li {
  padding: 4px 0;
  border-bottom: 1px solid #333;
  display: flex;
  gap: 6px;
}
.equip-label { color: #888; min-width: 50px; }
.equip-value { color: var(--blue); }

/* ── Achievements ── */
.achievements { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.badge {
  width: 24px; height: 24px;
  border: 2px solid #555;
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  background: #222;
  cursor: help;
}
.badge.earned { border-color: var(--gold); background: #332200; }

/* ── Quest Log ── */
.quest-panel { grid-column: 2; }
.quest-list { list-style: none; max-height: 180px; overflow-y: auto; }
.quest-list li {
  padding: 6px 4px;
  border-bottom: 1px solid #222;
  font-size: 8px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.quest-status { min-width: 20px; text-align: center; }

/* ── Activity Feed ── */
.feed-panel { grid-column: 2; overflow-y: auto; }
.feed-list { list-style: none; }
.feed-list li {
  padding: 5px 4px;
  border-bottom: 1px solid #1a1a2e;
  font-size: 8px;
  display: flex;
  gap: 6px;
  align-items: flex-start;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}
.feed-time { color: #666; min-width: 45px; font-size: 7px; }
.feed-icon { min-width: 16px; text-align: center; }
.feed-text { color: #ccc; }
.feed-xp { color: var(--gold); margin-left: auto; white-space: nowrap; }
.feed-fail .feed-text { color: var(--red); }

/* ── Stats Panel ── */
.stats-panel { grid-row: 1 / 3; }
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.stat-box {
  background: #111;
  border: 2px solid #333;
  padding: 8px;
  text-align: center;
}
.stat-val { font-size: 16px; color: var(--green); }
.stat-label { font-size: 7px; color: #888; margin-top: 4px; }

/* ── Skill Usage ── */
.skill-list { list-style: none; max-height: 300px; overflow-y: auto; }
.skill-list li {
  padding: 4px 0;
  border-bottom: 1px solid #222;
  font-size: 8px;
  display: flex;
  gap: 6px;
  align-items: center;
}
.skill-bar-wrap {
  flex: 1;
  background: #222;
  height: 8px;
  border: 1px solid #444;
}
.skill-bar {
  height: 100%;
  background: var(--mana);
  transition: width 0.5s;
}
.skill-count { color: var(--blue); min-width: 30px; text-align: right; }

/* ── Level Up Animation ── */
.level-up-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.level-up-overlay.active { display: flex; }
.level-up-text {
  font-size: 24px;
  color: var(--gold);
  text-shadow: 0 0 20px var(--gold), 0 0 40px #ff8c00;
  animation: levelPulse 0.5s ease infinite alternate;
}
@keyframes levelPulse {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}
.level-up-detail { font-size: 10px; color: var(--purple); margin-top: 16px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--panel); }
::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
  }
  .char-panel, .stats-panel { grid-row: auto; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>⚔️ AXLE QUEST</h1>
  <span class="status" id="connStatus">● 連線中...</span>
</div>

<!-- Grid Layout -->
<div class="grid">
  <!-- LEFT: Character Panel -->
  <div class="panel char-panel">
    <div class="panel-title">🧙 角色資訊</div>
    <div class="char-sprite">
      <div class="pixel-char" id="charSprite">🧙</div>
    </div>
    <div class="char-info">
      <div class="char-level">Lv.<span id="charLevel">1</span></div>
      <div class="char-title" id="charTitle">見習編碼師</div>
    </div>
    <div class="xp-bar-wrap">
      <div class="xp-bar-fill" id="xpBar" style="width:0%"></div>
    </div>
    <div class="xp-text">XP: <span id="xpCurrent">0</span> / <span id="xpNext">56</span></div>

    <div class="panel-title" style="margin-top:12px">⚔️ 裝備欄</div>
    <ul class="equip-list">
      <li><span class="equip-label">🗡 武器:</span><span class="equip-value" id="eqWeapon">-</span></li>
      <li><span class="equip-label">🛡 防具:</span><span class="equip-value" id="eqArmor">-</span></li>
      <li><span class="equip-label">💎 飾品:</span><span class="equip-value" id="eqAccessory">-</span></li>
      <li><span class="equip-label">👥 同伴:</span><span class="equip-value" id="eqCompanions">0</span></li>
    </ul>

    <div class="panel-title" style="margin-top:12px">🏆 成就</div>
    <div class="achievements" id="achievements"></div>
  </div>

  <!-- CENTER TOP: Quest Log -->
  <div class="panel quest-panel">
    <div class="panel-title">📜 任務卷軸</div>
    <ul class="quest-list" id="questList">
      <li><span class="quest-status">⏳</span> 等待冒險指令...</li>
    </ul>
  </div>

  <!-- CENTER BOTTOM: Activity Feed -->
  <div class="panel feed-panel">
    <div class="panel-title">⚔️ 戰鬥日誌</div>
    <ul class="feed-list" id="feedList"></ul>
  </div>

  <!-- RIGHT: Stats Panel -->
  <div class="panel stats-panel">
    <div class="panel-title">📊 冒險統計</div>
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-val" id="statTasks">0</div>
        <div class="stat-label">總任務數</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statXP">0</div>
        <div class="stat-label">總 XP</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statSkills">0</div>
        <div class="stat-label">技能種類</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statAchievements">0</div>
        <div class="stat-label">成就</div>
      </div>
    </div>

    <div class="panel-title">🔮 技能使用</div>
    <ul class="skill-list" id="skillList"></ul>

    <div class="panel-title" style="margin-top:12px">⏱ 運行時間</div>
    <div style="font-size:10px;color:var(--green);margin-top:4px" id="uptime">00:00:00</div>
  </div>
</div>

<!-- Level Up Overlay -->
<div class="level-up-overlay" id="levelUpOverlay">
  <div class="level-up-text">⚔️ LEVEL UP! ⚔️</div>
  <div class="level-up-detail" id="levelUpDetail"></div>
</div>

<script>
// ── Skill icon map ──
const SKILL_ICONS = {
  read_code:'👁', write_file:'✏️', exec_shell:'🗡', copilot:'🔮',
  copilot_stream:'⚡', web_search:'🔍', web_fetch:'🌐', git_status:'🧭',
  git_diff:'📊', git_push:'🚀', search_code:'🔎', list_dir:'🗺',
  send_email:'📨', read_email:'📬', calendar:'📅', briefing:'📜',
  sub_agent:'👥', plugin:'🧩', safety_block:'🛡', pdf:'📄',
  image:'📸', github:'📋', level_up:'🎉'
};

const ACHIEVEMENT_MAP = {
  first_blood:    {icon:'⚔️', name:'初戰告捷'},
  '10_tasks':     {icon:'🔟', name:'十連勝'},
  '100_tasks':    {icon:'💯', name:'百戰百勝'},
  '500_tasks':    {icon:'🏅', name:'千錘百煉'},
  first_summon:   {icon:'🔮', name:'首次召喚'},
  '10_summons':   {icon:'✨', name:'召喚大師'},
  first_strike:   {icon:'🗡', name:'初次突擊'},
  code_scanner:   {icon:'👁', name:'代碼獵人'},
  git_master:     {icon:'🚀', name:'Git 大師'},
  multi_skilled:  {icon:'🌟', name:'全能冒險者'},
  level_10:       {icon:'⭐', name:'Lv.10'},
  level_25:       {icon:'🌟', name:'Lv.25'},
  level_50:       {icon:'💫', name:'Lv.50'},
};

const TIER_SPRITES = {
  'Apprentice':        '🧑‍💻',
  'Code Ranger':       '🧝',
  'Data Mage':         '🧙',
  'Arch Sorcerer':     '🧙‍♂️',
  'Legendary Crafter': '⚜️',
  'Immortal Engine':   '🤖',
};

let ws, state = {}, reconnectTimer;
const $ = id => document.getElementById(id);

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    $('connStatus').textContent = '● 已連線';
    $('connStatus').className = 'status';
  };

  ws.onclose = () => {
    $('connStatus').textContent = '● 離線';
    $('connStatus').className = 'status offline';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') {
      state = msg.state;
      renderAll();
    } else if (msg.type === 'event') {
      handleEvent(msg.event, msg.state);
    }
  };
}

function handleEvent(evt, stateUpdate) {
  // Check for level up
  if (evt.skill_id === 'level_up') {
    showLevelUp(evt.detail);
  }

  // Update state
  if (stateUpdate) {
    state.level = stateUpdate.level;
    state.total_xp = stateUpdate.total_xp;
    state.next_level_xp = stateUpdate.next_level_xp;
    state.tier = stateUpdate.tier;
  }

  // Add to events
  if (!state.events) state.events = [];
  state.events.push(evt);
  if (state.events.length > 100) state.events = state.events.slice(-100);

  // Update skill uses
  if (!state.skill_uses) state.skill_uses = {};
  state.skill_uses[evt.skill_id] = (state.skill_uses[evt.skill_id] || 0) + 1;
  state.total_tasks = (state.total_tasks || 0) + 1;

  renderAll();
  addFeedItem(evt);
}

function renderAll() {
  // Character
  const level = state.level || 1;
  const xp = state.total_xp || 0;
  const tierEN = state.tier?.title_en || 'Apprentice';
  const tierTitle = state.tier?.title || '見習編碼師';
  const tierIcon = state.tier?.icon || '🟤';

  $('charLevel').textContent = level;
  $('charTitle').textContent = `${tierIcon} ${tierTitle}`;
  $('charSprite').textContent = TIER_SPRITES[tierEN] || '🧑‍💻';

  // XP bar
  const nextXP = state.next_level_xp || 56;
  const prevXP = state.level > 1 ? calcXP(level) : 0;
  const progress = nextXP > prevXP ? Math.min(100, ((xp - prevXP) / (nextXP - prevXP)) * 100) : 0;
  $('xpBar').style.width = progress + '%';
  $('xpCurrent').textContent = xp;
  $('xpNext').textContent = nextXP;

  // Equipment
  const eq = state.equipment || {};
  $('eqWeapon').textContent = eq.weapon || '-';
  $('eqArmor').textContent = eq.armor || 'Whitelist Shield';
  $('eqAccessory').textContent = eq.accessory || '-';
  $('eqCompanions').textContent = eq.companions || 0;

  // Stats
  $('statTasks').textContent = state.total_tasks || 0;
  $('statXP').textContent = xp;
  const skillCount = state.skill_uses ? Object.keys(state.skill_uses).length : 0;
  $('statSkills').textContent = skillCount;
  $('statAchievements').textContent = state.achievements?.length || 0;

  // Skill usage bars
  renderSkills();
  renderAchievements();
  renderEvents();
}

function renderSkills() {
  const uses = state.skill_uses || {};
  const max = Math.max(1, ...Object.values(uses));
  const sorted = Object.entries(uses).sort((a, b) => b[1] - a[1]);

  $('skillList').innerHTML = sorted.map(([id, count]) => {
    const icon = SKILL_ICONS[id] || '❓';
    const pct = (count / max * 100).toFixed(0);
    return `<li>
      <span>${icon}</span>
      <div class="skill-bar-wrap"><div class="skill-bar" style="width:${pct}%"></div></div>
      <span class="skill-count">${count}</span>
    </li>`;
  }).join('');
}

function renderAchievements() {
  const earned = new Set(state.achievements || []);
  $('achievements').innerHTML = Object.entries(ACHIEVEMENT_MAP).map(([id, info]) => {
    const cls = earned.has(id) ? 'badge earned' : 'badge';
    return `<div class="${cls}" title="${info.name}">${info.icon}</div>`;
  }).join('');
}

function renderEvents() {
  const events = (state.events || []).slice(-5).reverse();
  $('questList').innerHTML = events.map(e => {
    const status = e.success ? '✅' : '❌';
    const icon = SKILL_ICONS[e.skill_id] || '❓';
    return `<li><span class="quest-status">${status}</span>${icon} ${e.skill_name}: ${truncate(e.detail, 30)}</li>`;
  }).join('') || '<li><span class="quest-status">⏳</span> 等待冒險指令...</li>';
}

function addFeedItem(evt) {
  const list = $('feedList');
  const li = document.createElement('li');
  if (!evt.success) li.className = 'feed-fail';

  const time = new Date(evt.time).toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const icon = SKILL_ICONS[evt.skill_id] || '❓';
  const xpText = evt.xp > 0 ? `+${evt.xp} XP` : '';

  li.innerHTML = `
    <span class="feed-time">${time}</span>
    <span class="feed-icon">${icon}</span>
    <span class="feed-text">${evt.skill_name} → ${truncate(evt.detail, 40)}</span>
    <span class="feed-xp">${xpText}</span>
  `;
  list.prepend(li);

  // Keep max 50
  while (list.children.length > 50) list.removeChild(list.lastChild);
}

function showLevelUp(detail) {
  const overlay = $('levelUpOverlay');
  $('levelUpDetail').textContent = detail;
  overlay.classList.add('active');
  setTimeout(() => overlay.classList.remove('active'), 3000);
}

function truncate(s, n) {
  return s && s.length > n ? s.substring(0, n) + '...' : (s || '');
}

// Approximate XP formula (matches Go side)
function calcXP(level) {
  return level <= 1 ? 0 : Math.floor(20 * Math.pow(level, 1.5));
}

// Uptime counter
let startTime = Date.now();
setInterval(() => {
  const secs = Math.floor((Date.now() - startTime) / 1000);
  const h = String(Math.floor(secs / 3600)).padStart(2, '0');
  const m = String(Math.floor((secs % 3600) / 60)).padStart(2, '0');
  const s = String(secs % 60).padStart(2, '0');
  $('uptime').textContent = `${h}:${m}:${s}`;
}, 1000);

connect();
</script>
</body>
</html>
